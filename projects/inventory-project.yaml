apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: inventory
  namespace: argocd
spec:
  description: Inventory Platform Project

  sourceRepos:
    - https://github.com/aimlcloud/inventory-platform.git

  destinations:
    - namespace: inventory
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

